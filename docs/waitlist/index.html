<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started: Attest</title>
  <meta name="description" content="Sign up for Attest. See and control what your AI agents do." />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
  <style>
    .signup-page { max-width: 640px; margin: 0 auto; padding: 80px 24px; text-align: center; }
    .signup-page h1 { font-size: clamp(24px, 3vw, 36px); margin-bottom: 12px; }
    .signup-page .body-lg { margin-bottom: 40px; }
    .signup-page iframe { width: 100%; border: none; border-radius: var(--radius-lg); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-shell">
      <a href="../" class="logo">Attest</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="../">Product</a></li>
        <li class="nav-dropdown" id="nav-dropdown">
          <button class="nav-dropdown-trigger" aria-expanded="false">
            Developers
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5l3 3 3-3"/></svg>
          </button>
          <div class="nav-dropdown-menu">
            <a href="../docs/">Docs</a>
            <a href="../mcp/">MCP Guide</a>
            <a href="../demo/">Demo</a>
            <a href="../verify/">Verify</a>
            <a href="https://github.com/chudah1/attest-dev" target="_blank">GitHub</a>
          </div>
        </li>
        <li><a href="./" class="active">Pricing</a></li>
        <li class="nav-sep"></li>
        <li><a href="#" data-dashboard-link>Log in</a></li>
        <li><a href="./" class="btn btn-primary">Get Started</a></li>
      </ul>
    </div>
  </nav>

  <main class="signup-page">
    <p class="category">Get Started</p>
    <h1>Start seeing what your agents do</h1>
    <p class="body-lg">Sign up for early access. Free during beta.</p>
    <iframe data-tally-src="https://tally.so/embed/KYJ8yD?alignLeft=1&hideTitle=1&dynamicHeight=1" loading="lazy" width="100%" height="300"></iframe>
  </main>

  <footer class="footer">
    <div class="footer-shell">
      <span>Attest</span>
      <div class="footer-links">
        <a href="../docs/">Docs</a>
        <a href="https://github.com/chudah1/attest-dev" target="_blank">GitHub</a>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('nav-toggle').addEventListener('click', () => {
      document.getElementById('nav-links').classList.toggle('open');
    });
    const dropdown = document.getElementById('nav-dropdown');
    const trigger = dropdown.querySelector('.nav-dropdown-trigger');
    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('open');
      trigger.setAttribute('aria-expanded', dropdown.classList.contains('open'));
    });
    document.addEventListener('click', () => {
      dropdown.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
    });

    (function() {
      const links = document.querySelectorAll('[data-dashboard-link]');
      const params = new URLSearchParams(window.location.search);
      const override = params.get('dashboard_url') || localStorage.getItem('attest_dashboard_url');
      if (override) {
        localStorage.setItem('attest_dashboard_url', override);
        links.forEach(a => a.href = override);
        return;
      }
      const localUrl = 'http://localhost:5173';
      fetch(localUrl, { mode: 'no-cors' }).then(() => {
        links.forEach(a => a.href = localUrl);
      }).catch(() => {
        links.forEach(a => a.href = 'https://api.attestdev.com/dashboard');
      });
    })();

    // Tally embed loader
    var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w;s.onload=v;s.onerror=v;d.body.appendChild(s)}else v();
  </script>
</body>
</html>
