# Composes the Attest server, PostgreSQL, and Redis for local development.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [attest]
    environment:
      POSTGRES_DB: attest
      POSTGRES_USER: attest
      POSTGRES_PASSWORD: attest
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attest -d attest"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [attest]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://attest:attest@postgres:5432/attest"
      ISSUER_URI: "http://localhost:8080"

networks:
  attest:
    driver: bridge

volumes:
  pg_data:
