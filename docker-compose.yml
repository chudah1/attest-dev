# Composes the Warrant server, PostgreSQL, and Redis for local development.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [warrant]
    environment:
      POSTGRES_DB: warrant
      POSTGRES_USER: warrant
      POSTGRES_PASSWORD: warrant
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warrant -d warrant"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [warrant]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [warrant]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://warrant:warrant@postgres:5432/warrant"
      ISSUER_URI: "http://localhost:8080"
      PRIVATE_KEY_PATH: ""   # empty → ephemeral dev key generated at startup

networks:
  warrant:
    driver: bridge

volumes:
  pg_data:
